name: Inject Build Timestamp

on:
  push:
    branches: [ principale ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject timestamp into index.html
        run: |
          TIMESTAMP=$(TZ="Europe/Rome" date "+%d/%m/%Y %H:%M")
          sed -i "s/__BUILD_TIMESTAMP__/${TIMESTAMP}/g" index.html
          echo "Timestamp: ${TIMESTAMP}"

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Build: $(TZ='Europe/Rome' date '+%d/%m/%Y %H:%M')"
          git push
